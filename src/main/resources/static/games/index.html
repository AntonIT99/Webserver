<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Spiele</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 32px 16px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(720px, 100%);
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 64px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .card {
            width: 210px;
            min-height: 96px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 18px 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.13);
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card h2 {
            margin: 0;
            font-size: 1.15rem;
        }

        .back-link {
            display: inline-block;
            margin-top: 48px;
            color: #cfd8dc;
            text-decoration: none;
        }

        .back-link:hover {
            color: #f5f5f5;
        }

        @media (max-width: 520px) {
            h1 {
                font-size: 2.25rem;
                margin-bottom: 48px;
            }

            .cards {
                flex-direction: column;
                align-items: center;
            }

            .card {
                width: min(260px, 100%);
            }
        }
    </style>
</head>
<body>
<main class="container">
    <h1>Spiele</h1>

    <div class="cards">
        <a class="card" href="/games/minecraft">
            <div class="icon">⛏️</div>
            <h2>Minecraft</h2>
        </a>
    </div>

    <a class="back-link" href="/">Zur Startseite</a>
</main>
</body>
</html>
