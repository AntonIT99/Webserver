<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Server</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            width: min(420px, 100%);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 32px;
            backdrop-filter: blur(8px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 28px;
            font-size: 2rem;
            text-align: center;
        }

        h2 {
            margin: 0 0 24px;
            padding: 14px 16px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.28);
            text-align: center;
        }

        .online {
            color: #4ade80;
        }

        .offline {
            color: #f87171;
        }

        .label {
            color: #cfd8dc;
        }

        p {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin: 14px 0;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        p:last-of-type {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .value {
            text-align: right;
        }

        .back-link {
            display: block;
            margin-top: 28px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            padding: 12px 16px;
            color: #cfd8dc;
            background: rgba(255, 255, 255, 0.12);
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .back-link:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.18);
        }

        @media (max-width: 420px) {
            .card {
                padding: 24px;
            }

            p {
                display: block;
            }

            .value {
                display: block;
                margin-top: 6px;
                text-align: left;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Minecraft Server</h1>

    <h2 id="status">Lade...</h2>

    <p><span class="label">Version:</span> <span class="value" id="version">-</span></p>
    <p><span class="label">Spieler:</span> <span class="value" id="players">-</span></p>
    <p><span class="label">MOTD:</span> <span class="value" id="motd">-</span></p>
    <p><span class="label">Letztes Update:</span> <span class="value" id="updated">-</span></p>

    <a class="back-link" href="/">Zur Startseite</a>
</div>

<script>
    async function loadStatus() {
        const statusEl = document.getElementById("status");

        try {
            const response = await fetch("/api/minecraft/status");
            const data = await response.json();

            if (data.online) {
                statusEl.textContent = "Online";
                statusEl.className = "online";

                document.getElementById("version").textContent = data.version;
                document.getElementById("players").textContent =
                    `${data.onlinePlayers} / ${data.maxPlayers}`;
                document.getElementById("motd").textContent = data.motd ?? "-";
            } else {
                statusEl.textContent = "Offline";
                statusEl.className = "offline";

                document.getElementById("version").textContent = "-";
                document.getElementById("players").textContent = "-";
                document.getElementById("motd").textContent = data.error ?? "-";
            }

            document.getElementById("updated").textContent =
                new Date().toLocaleTimeString();

        } catch (e) {
            statusEl.textContent = "Fehler";
            statusEl.className = "offline";
        }
    }

    loadStatus();
    setInterval(loadStatus, 10000);
</script>
</body>
</html>
