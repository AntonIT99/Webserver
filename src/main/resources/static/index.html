<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wolfsschanze-Netz</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background-image: url('/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #f5f5f5;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            text-align: center;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(980px, calc(100% - 32px));
            margin-top: 64px;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 500px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .card {
            width: 190px;
            min-height: 96px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 18px 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.13);
        }

        .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .icon svg {
            display: block;
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .card h2 {
            margin: 0;
            font-size: 1.15rem;
        }

        footer {
            margin-top: 48px;
            color: #78909c;
            font-size: 0.9rem;
        }

        @media (max-width: 520px) {
            .container {
                margin-top: 40px;
            }

            h1 {
                font-size: 2.25rem;
                margin-bottom: 88px;
            }

            .cards {
                flex-direction: column;
                align-items: center;
            }

            .card {
                width: min(260px, 100%);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Wolfsschanze-Netz</h1>

    <div class="cards">
        <a class="card" href="/login">
            <div class="icon">🔐</div>
            <h2>Login</h2>
        </a>

        <a class="card" href="/games">
            <div class="icon">🎮</div>
            <h2>Spiele</h2>
        </a>

        <a class="card" href="https://github.com/AntonIT99" target="_blank" rel="noopener noreferrer">
            <div class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img">
                    <path d="M12 0.5C5.65 0.5 0.5 5.65 0.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56v-2.01c-3.2.7-3.88-1.54-3.88-1.54-.52-1.33-1.28-1.69-1.28-1.69-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .97-.31 3.16 1.18.92-.26 1.9-.38 2.88-.39.98.01 1.96.13 2.88.39 2.19-1.49 3.15-1.18 3.15-1.18.63 1.58.23 2.75.12 3.04.74.8 1.18 1.83 1.18 3.08 0 4.42-2.69 5.38-5.25 5.67.42.36.78 1.07.78 2.16v3.2c0 .31.21.67.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/>
                </svg>
            </div>
            <h2>GitHub Profil</h2>
        </a>

        <a class="card" href="https://github.com/AntonIT99/GermanicKeyboard/releases" target="_blank" rel="noopener noreferrer">
            <div class="icon">ᚠᚢᚦᚨᚱᚲ</div>
            <h2>Runentastatur für Android</h2>
        </a>
    </div>

    <footer>
        Wolfsschanze-Netz
    </footer>
</div>
</body>
</html>
